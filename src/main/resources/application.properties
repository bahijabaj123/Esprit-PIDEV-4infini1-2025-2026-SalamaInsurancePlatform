server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/SalamaInsuranceDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=SalamaInsuranceSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256
jwt.expiration-ms=86400000


# Verification token
verification.token.expiry-hours=24

# Password reset token
password.reset.token.expiry-minutes=30

# Mail (SMTP - Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
#spring.mail.username=
#spring.mail.password=

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Mail envelope (EmailService). Defaults align with spring.mail; override with MAIL_FROM / MAIL_FROM_NAME if needed.
mail.from=${MAIL_FROM:${spring.mail.username}}
mail.from-name=${MAIL_FROM_NAME:Salama Insurance}
# Public base URL for links in emails (verification, etc.). Override with APP_BASE_URL when not localhost.
app.base-url=${APP_BASE_URL:http://localhost:8082}

# Public base URL for password reset page (should be a frontend URL).
# Contains ONLY the raw token in the query string. Override with PASSWORD_RESET_BASE_URL.
password.reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:3000/reset-password}

# Google OAuth2
#spring.security.oauth2.client.registration.google.client-id=
#spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8082/login/oauth2/code/google
